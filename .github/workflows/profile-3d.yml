name: 3D Contrib

on:
  schedule:
    - cron: "0 0 * * *"
  push:
    branches:
      - main
      - master
    paths-ignore:
      - 'profile-3d-contrib/**'
      - 'README.md'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    name: generate-github-profile-3d-contrib
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Generate 3D Contribution Graphs
        uses: yoshi389111/github-profile-3d-contrib@latest
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          USERNAME: ${{ github.repository_owner }}

      - name: Post-process & Beautify SVGs
        run: node .github/scripts/post-process.js

      - name: Commit & Push
        run: |
          git config user.name "naborajs"
          git config user.email "nishant.ns.business@gmail.com"
          git add -A .
          git diff --staged --quiet || (git commit -m "Update 3D contrib [skip ci]" && git push)
